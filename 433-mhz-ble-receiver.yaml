esphome:
  name: 433-mhz-ble-receiver
  friendly_name: 433 MHz + BLE receiver

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "GlkzRMFaJhCNd/i8Hq15qi4mwJZW6KYWIzAUInUmit8="
  actions:
    - action: rtttl_play
      variables:
        song_str: string
      then:
        - rtttl.stop
        - rtttl.play:
            rtttl: !lambda 'return song_str;'

ota:
  - platform: esphome
    password: "91c15cceed24a45944f3caa31cd03e97"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  manual_ip: 
    static_ip: 10.0.8.44
    subnet: 255.255.252.0
    gateway: 10.0.8.1
    dns1: 10.0.8.1
    dns2: 1.1.1.1

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "433-Mhz-+-BLE-Receiver"
    password: "UffirueHCX2m"

captive_portal:

status_led:
  pin: 8

remote_receiver:
  pin: GPIO0
  #dump: all
  dump: rc_switch
  tolerance: 55%
  filter: 300us
  idle: 10ms
  buffer_size: 4kb
  #on_pronto: 
  #  then:
  #      - homeassistant.event:
  #          event: esphome.433mhz
  #          data:
  #            pronto: !lambda "return x.data;"
  on_rc_switch:  
    then:
        - homeassistant.event:
            event: esphome.433mhz
            data:
              rc_switch: !lambda "char buf[64]; for (uint8_t i=0; i<64; i++) buf[63-i]=((x.code>>i)&1) ? '1' : '0'; return std::string(buf,64);"

binary_sensor:
  - platform: status
    name: "Online"
    id: online

  - platform: gpio
    pin:
      number: GPIO10
      mode:
        input: true
        pullup: true
    device_class: window
    name: "Druckbar Fenster"
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms

  - platform: remote_receiver
    name: "433 MHz Taste 3D-1"
    id: d1
    rc_switch_raw:
      code: "110110000100000000001000"
      protocol: 1
    filters:
      - delayed_off: 200ms
  - platform: remote_receiver
    name: "433 MHz Taste 3D-2"
    id: d2
    rc_switch_raw:
      code: "001100010010110000011000"
      protocol: 1
    filters:
      - delayed_off: 200ms
  - platform: remote_receiver
    name: "433 MHz Taste 3D-3"
    id: d3
    rc_switch_raw:
      code: "110010111110100000011000"
      protocol: 1
    filters:
      - delayed_off: 200ms
  - platform: remote_receiver
    name: "433 MHz Taste 3D-4"
    id: d4
    rc_switch_raw:
      code: "100000010000000000011000"
      protocol: 1
    filters:
      - delayed_off: 200ms
  - platform: remote_receiver
    name: "433 MHz Taste 3D-Licht"
    id: dl
    rc_switch_raw: 
      code: "101001010110010010011000"
      protocol: 1
    filters:
      - delayed_off: 200ms

  - platform: remote_receiver
    name: "Pink A"
    id: pink_a
    rc_switch_raw:
      code: "000010111000000010101000"
      protocol: 1
    filters:
      - delayed_off: 200ms
  - platform: remote_receiver
    name: "Pink B"
    id: pink_b
    rc_switch_raw:
      code: "000010111000000010100100"
      protocol: 1
    filters:
      - delayed_off: 200ms
  - platform: remote_receiver
    name: "Pink C"
    id: pink_c
    rc_switch_raw:
      code: "000010111000000010100010"
      protocol: 1
    filters:
      - delayed_off: 200ms
  - platform: remote_receiver
    name: "Pink D"
    id: pink_d
    rc_switch_raw:
      code: "000010111000000010100001"
      protocol: 1
    filters:
      - delayed_off: 200ms
  - platform: remote_receiver
    name: "UwU"
    rc_switch_raw:
      code: "100010010001001001011000"
      protocol: 1
    filters:
      - delayed_off: 200ms
  - platform: remote_receiver
    name: "Heart"
    rc_switch_raw:
      code: "010010101100110101101000"
      protocol: 1
    filters:
      - delayed_off: 200ms
  - platform: remote_receiver
    name: "Music"
    rc_switch_raw:
      code: "010001101010110001110001"
      protocol: 1
    filters:
      - delayed_off: 200ms
bluetooth_proxy:
  active: True

# Configure the output
output:
  - platform: ledc
    pin: GPIO7
    id: rtttl_out

rtttl:
  output: rtttl_out
  on_finished_playback:
    - logger.log: 'Song ended!'

light:
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    pin: 4
    num_leds: 6
    id: status_leds
    chipset: WS2812

  - platform: partition
    name: "LED 1"
    id: led1
    restore_mode: ALWAYS_OFF
    segments:
      - id: status_leds
        from: 1
        to: 1

  - platform: partition
    name: "LED 2"
    id: led2
    restore_mode: ALWAYS_OFF
    segments:
      - id: status_leds
        from: 2
        to: 2

  - platform: partition
    name: "LED 3"
    id: led3
    restore_mode: ALWAYS_OFF
    segments:
      - id: status_leds
        from: 3
        to: 3

  - platform: partition
    name: "LED 4"
    id: led4
    restore_mode: ALWAYS_OFF
    segments:
      - id: status_leds
        from: 4
        to: 4
